apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  labels:
    app: my-app
  namespace: default

spec:
  replicas: 2

  selector:
    matchLabels:
      app: my-app

  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-container
          image: rajat431/my-java-app:50e79a142c1e0252a49aae45df138fcb27e11800
          ports:
            - containerPort: 8080